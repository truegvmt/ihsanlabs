# infra/docker-compose.yml
# Local development stack for Ihsan Labs
# NOTE: Supabase (Postgres + Auth + Storage + Edge runtime) is managed separately
#       via `supabase start`. This compose file covers supplementary services only.
# Usage: docker compose -f infra/docker-compose.yml up -d
# <!-- VIBE-CODER: Update [COMPOSE_VERSION] when services are added or image versions change -->
# [COMPOSE_VERSION]: 1.0.0

version: '3.9'

services:

  # ── Redis (optional, Phase 1+) ─────────────────────────────
  # Used for: rate-limit counters on the admin API, caching GlobalGiving
  # responses between the nightly sync and on-demand fetches.
  # Not required for Phase 0 — comment out if not needed.
  redis:
    image: redis:7-alpine
    container_name: ihsan_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── RAG pipeline worker (background) ──────────────────────
  # Runs the nightly PDF ingestion and GlobalGiving sync.
  # In production this is a scheduled job (cron or Supabase scheduled function).
  # Locally it can be run on demand with: docker compose run --rm rag-worker
  rag-worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.rag-worker
    container_name: ihsan_rag_worker
    environment:
      - SUPABASE_URL=${SUPABASE_URL:-http://host.docker.internal:54321}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GLOBALGIVING_API_KEY=${GLOBALGIVING_API_KEY}
      - CHARITY_NAVIGATOR_APP_ID=${CHARITY_NAVIGATOR_APP_ID}
      - CHARITY_NAVIGATOR_APP_KEY=${CHARITY_NAVIGATOR_APP_KEY}
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - workers   # only starts with: docker compose --profile workers up

volumes:
  redis_data:
    driver: local
